<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <meta name="description" content="quinto projeto, formulário de login, css e html">
    <meta name="keywords" content="html,css,design">
    <meta name="author" content="Lia Alvarez">
    <meta name="robots" content="index, follow">
    <link rel="shortcut icon" href="img/icons5.png" type="image/x-icon">
    <script src="https://kit.fontawesome.com/226ebfd27f.js" crossorigin="anonymous"></script>
    <title>Login Form</title>
</head>

<body>
    <div class="container">
        <div class="wrapper">
            <div class="title"><span>Login Form</span></div>
            <form action="#">
                <div class="row">
                    <i class="fas fa-user"></i>
                    <input type="text" placeholder="E-mail ou telefone" required>
                </div>
                <div class="row">
                    <i class="fas fa-lock"></i>
                    <input type="password" placeholder="Senha" required>
                </div>
                <div class="pass"><a href="#">Esqueceu a senha?</a></div>
                <div class="row button">
                    <input type="submit" value="Login">
                </div>
                <div class="signup-link">Não é um membro? <a href="#">Cadastre-se agora</a></div>
            </form>
        </div>
    </div>
</body>

</html>
